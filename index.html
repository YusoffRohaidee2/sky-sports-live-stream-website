<body class="text-gray-200 font-sans min-h-screen pb-10 selection:bg-red-500 selection:text-white">

    <!-- Header (Mengikut rujukan imej image_45b23a.png) -->

        <div class="text-xs text-gray-500 font-mono tracking-wider uppercase flex items-center gap-2">

    <!-- Main Dashboard -->
    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- PEMAIN VIDEO & BEZEL INFO -->
        <div class="lg:col-span-2 space-y-3">
            <div class="p-2 bg-gradient-to-b from-gray-800 to-gray-950 rounded-xl shadow-2xl border border-gray-800/80">
                <div class="bg-black rounded-lg overflow-hidden aspect-video relative">
                    <video id="video-player" class="w-full h-full object-contain" controls autoplay playsinline></video>
                    
                    <!-- Placeholder Skrin -->
                    <div id="player-placeholder" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-950 text-center z-10">
                        <i class="fa-solid fa-circle-play text-4xl text-gray-700 mb-2 animate-pulse"></i>
                        <p class="text-sm font-medium text-gray-400">Select a channel from the directory</p>
                    </div>
                </div>

                <!-- BEZEL STRIM BAWAH -->
                <div class="mt-2 px-3 py-2 bg-gray-900/90 rounded-md flex justify-between items-center gap-3 border border-gray-800" id="bezel-info">
                    <div class="flex items-center gap-2.5">
                        <div class="w-2 h-2 rounded-full bg-gray-600" id="live-indicator"></div>
                        <span id="current-title" class="text-xs font-medium tracking-wide text-gray-500">No Stream Active</span>
                    </div>
                    <!-- Badges Spefifikasi Bezel -->
                    <div class="flex items-center gap-1.5 text-[10px] font-bold tracking-wider">
                        <span id="current-quality" class="px-2 py-0.5 bg-gray-800 text-gray-400 rounded border border-gray-700/50">--</span>
                        <span id="current-fps" class="px-2 py-0.5 bg-gray-800 text-gray-400 rounded border border-gray-700/50">--</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- SENARAI SALURAN -->
        <div class="space-y-2.5">
            <h3 class="text-[10px] uppercase font-bold tracking-widest text-gray-500 px-1">
                <i class="fa-solid fa-globe text-red-500 mr-1"></i> Channel Directory
            </h3>
            
            <!-- Susunan Melintang Menurun Ke Bawah -->
            <div class="space-y-2 max-h-[460px] overflow-y-auto pr-1" id="channels-list">
                <!-- Senarai dijanakan oleh JavaScript -->
            </div>
        </div>

    </main>

            {

            {

                url: "http://stream.bottledesk.net/p/BgJNQQUCfWc/tracks-v1a1/mono.m3u8?token=MjRTeGlKNmFydGFiZTV6ZGc2MjNtOGVtMXBxdG1MR0ZzSXpIeHEycnlxL0RxNEduaVp1UnBxU2VlWmF0ZnRlRGxaMm0wNStDbnJOOXJJM0puSytpbkE9PQ==", 
                fps: "25 FPS", quality: "HD" 
            },
            { 
                title: "Sky Sports Racing HD (1)", 
                logo: "https://d2n0069hmnqmmx.cloudfront.net/epgdata/1.0/newchanlogos/512/512/skychb1354.png",
                url: "http://sewv654wfcsdwfi87fwvgbngh.siauliairsavlt.pw/iptv/KE3KFU2M4B95FE/7341/index.m3u8", 
                fps: "50 FPS", quality: "HD" 
            }
        ];

        const listContainer = document.getElementById('channels-list');
        const video = document.getElementById('video-player');
        const placeholder = document.getElementById('player-placeholder');
        
        const infoTitle = document.getElementById('current-title');
        const infoQuality = document.getElementById('current-quality');
        const infoFps = document.getElementById('current-fps');
        const liveIndicator = document.getElementById('live-indicator');
        
        let hls = null;

        streams.forEach((stream, index) => {
            const row = document.createElement('div');
            row.className = "list-card rounded-lg p-2 flex items-center justify-between cursor-pointer border border-gray-800/40";
            row.onclick = () => playLiveStream(stream, row);

            row.innerHTML = `
                <div class="flex items-center gap-2.5">
                    <img src="${stream.logo}" alt="${stream.title}" class="h-7 w-7 object-contain drop-shadow">
                    <span class="text-xs font-semibold text-gray-300 tracking-wide">${stream.title}</span>
                </div>
                <div class="flex items-center gap-1.5 text-[9px] font-mono font-bold text-gray-500">
                    <span class="px-1.5 py-0.5 bg-gray-900/60 rounded border border-gray-800">${stream.quality}</span>
                    <span class="px-1.5 py-0.5 bg-gray-900/60 rounded border border-gray-800">${stream.fps}</span>
                </div>
            `;
            listContainer.appendChild(row);
        });

        function playLiveStream(stream, element) {
            placeholder.classList.add('hidden');

            infoTitle.innerText = `Live: ${stream.title}`;
            infoTitle.className = "text-xs font-semibold text-white tracking-wide";
            
            infoQuality.innerText = stream.quality;
            infoQuality.className = `px-2 py-0.5 rounded border font-mono ${stream.quality === 'HD' ? 'bg-red-950/80 text-red-400 border-red-900' : 'bg-slate-800 text-slate-400 border-slate-700'}`;
            
            infoFps.innerText = stream.fps;
            infoFps.className = "px-2 py-0.5 bg-gray-800 text-gray-300 rounded border border-gray-700 font-mono";

            liveIndicator.className = "w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444] animate-pulse";

            document.querySelectorAll('#channels-list > div').forEach(c => c.classList.remove('border-red-500/60', 'bg-red-950/10'));
            element.classList.add('border-red-500/60', 'bg-red-950/10');

            if (hls) { hls.destroy(); }

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(stream.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = stream.url;
                video.addEventListener('loadedmetadata', () => video.play());
            }
        }

</html>
